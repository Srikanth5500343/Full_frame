<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RackTrack — Full Frame Check</title>
  <style>
    html,body{height:100%;margin:0;background:#000;color:#fff;font-family:sans-serif}
    video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
    canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
    #toast{position:fixed;left:50%;transform:translateX(-50%);bottom:40px;z-index:2;width:92%;max-width:480px}
    .toast-inner{background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);border-radius:8px;padding:10px 14px;display:flex;gap:10px;align-items:center;border-left:3px solid #ffcc00}
    .toast-inner.ok{border-left-color:#00ff88}
    .toast-inner.err{border-left-color:#ff3b3b}
    .toast-icon{font-size:18px}
    .toast-label{font-size:10px;opacity:0.8}
    .toast-msg{font-weight:600}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="toast">
  <div class="toast-inner info" id="toastInner">
    <div class="toast-icon" id="toastIcon">ℹ️</div>
    <div style="flex:1">
      <div class="toast-label" id="toastLabel">Instructions</div>
      <div class="toast-msg" id="toastMsg">Initializing camera…</div>
    </div>
  </div>
</div>

<script>
// Minimal full-frame rack detection script — placed after DOM so elements exist.
const video = document.getElementById('video')
const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')
const toastInner = document.getElementById('toastInner')
const toastIcon = document.getElementById('toastIcon')
const toastLabel = document.getElementById('toastLabel')
const toastMsg = document.getElementById('toastMsg')

const offW = 160, offH = 120
const off = document.createElement('canvas'); off.width = offW; off.height = offH
const offCtx = off.getContext('2d', {willReadFrequently:true})

async function startCamera(){
  try{
    const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}, audio:false})
    video.srcObject = s
    await video.play().catch(()=>{})
    showToast('info','📸','Camera Ready','Point the camera at the rack')
  } catch(e){ showToast('err','⚠️','Camera Error', e.message) }
}

function grabOff(){
  try{ offCtx.drawImage(video,0,0,offW,offH); return offCtx.getImageData(0,0,offW,offH) }
  catch(e){ return {data:new Uint8ClampedArray(offW*offH*4)} }
}

function analyzeRackFrame(){
  const d = grabOff().data
  const lums = new Float32Array(offW * offH)
  for(let y=0;y<offH;y++) for(let x=0;x<offW;x++){
    const i=(y*offW+x)*4
    lums[y*offW+x] = d[i]*.299 + d[i+1]*.587 + d[i+2]*.114
  }
  let sum=0
  for(let i=0;i<lums.length;i++) sum+=lums[i]
  const b = sum/lums.length
  let varSum=0
  for(let i=0;i<lums.length;i++) varSum+=(lums[i]-b)*(lums[i]-b)
  const variance = varSum/lums.length
  const rowHasEdge = new Uint8Array(offH)
  for(let y=0;y<offH;y++){ let ec=0; for(let x=0;x<offW-4;x+=4) if(Math.abs(lums[y*offW+x]-lums[y*offW+x+4])>20) ec++; rowHasEdge[y]=ec>=3?1:0 }
  const colHasEdge = new Uint8Array(offW)
  for(let x=0;x<offW;x++){ let ec=0; for(let y=0;y<offH-4;y+=4) if(Math.abs(lums[y*offW+x]-lums[(y+4)*offW+x])>20) ec++; colHasEdge[x]=ec>=3?1:0 }
  let edgeRows=0, edgeCols=0
  for(let y=0;y<offH;y++) edgeRows+=rowHasEdge[y]
  for(let x=0;x<offW;x++) edgeCols+=colHasEdge[x]
  const rowCoverage = edgeRows/offH, colCoverage = edgeCols/offW
  const q = Math.floor(offH*0.25), qc = Math.floor(offW*0.25)
  let topEdge=0, botEdge=0, leftEdge=0, rightEdge=0
  for(let y=0;y<q;y++) topEdge+=rowHasEdge[y]
  for(let y=offH-q;y<offH;y++) botEdge+=rowHasEdge[y]
  for(let x=0;x<qc;x++) leftEdge+=colHasEdge[x]
  for(let x=offW-qc;x<offW;x++) rightEdge+=colHasEdge[x]
  const tooClose  = variance < 400 || b > 215
  const tooDark   = b < 25
  const noFullCoverage = rowCoverage < 0.60 || colCoverage < 0.60 || topEdge/q < 0.35 || botEdge/q < 0.35 || leftEdge/qc < 0.35 || rightEdge/qc < 0.35
  return { ok: !tooClose && !tooDark && !noFullCoverage, brightness: b, tooClose, tooDark, noFullCoverage }
}

function showToast(type, ico, lbl, msg){
  toastInner.className = 'toast-inner '+(type==='ok'?'ok':type==='err'?'err':'info')
  toastIcon.textContent = ico
  toastLabel.textContent = lbl
  toastMsg.textContent = msg
}

function drawRackGuide(){
  const W=canvas.width=window.innerWidth, H=canvas.height=window.innerHeight
  const bw=W*0.88, bh=H*0.86, bx=(W-bw)/2, by=(H-bh)/2
  ctx.clearRect(0,0,W,H)
  ctx.save(); ctx.strokeStyle='rgba(255,204,0,0.9)'; ctx.lineWidth=2; ctx.setLineDash([12,8]); ctx.strokeRect(bx,by,bw,bh); ctx.setLineDash([]); ctx.restore()
}

let lastAnalysis=0
function loop(){
  if(video.readyState >= 2){
    const now = Date.now()
    if(now - lastAnalysis > 600){
      const r = analyzeRackFrame()
      if(r.ok) showToast('ok','✅','Full Frame','Rack appears fully in frame')
      else if(r.tooDark) showToast('err','🌑','Too Dark','Improve lighting')
      else if(r.tooClose) showToast('err','🔍','Too Close','Step back')
      else if(r.noFullCoverage) showToast('err','⚠️','Not Full Rack','Fit entire rack in frame')
      lastAnalysis = now
    }
    drawRackGuide()
  }
  requestAnimationFrame(loop)
}

startCamera()
loop()
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rack Frame Detector</title>
    <script async src="https://cdnjs.cloudflare.com/ajax/libs/opencv.js/4.5.2/opencv.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #1a1a1a;
            border: 2px solid #00d4ff;
            border-radius: 4px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .video-section {
            position: relative;
            margin-bottom: 30px;
            border: 1px solid #333;
            border-radius: 4px;
            overflow: hidden;
            background: #0f0f0f;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }

        canvas {
            display: none;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .controls {
                grid-template-columns: 1fr;
            }
        }

        button {
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        .btn-primary {
            background: #00d4ff;
            color: #0f0f0f;
        }

        .btn-primary:hover {
            background: #00b8d4;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .btn-primary:disabled {
            background: #444;
            color: #999;
            cursor: not-allowed;
        }

        .message-box {
            background: #0f0f0f;
            border: 2px solid #333;
            border-radius: 4px;
            padding: 40px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-box.waiting {
            color: #888;
            border-color: #444;
        }

        .message-box.detected {
            color: #2ecc71;
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.1);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.2);
        }

        .message-box.not-detected {
            color: #ff6b35;
            border-color: #ff6b35;
            background: rgba(255, 107, 53, 0.1);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 RACK DETECTOR</h1>
        
        <div class="video-section">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <button class="btn-primary" id="startBtn" onclick="startCamera()">START</button>
            <button class="btn-primary" id="stopBtn" onclick="stopCamera()" disabled>STOP</button>
        </div>

        <div class="message-box waiting" id="messageBox">
            CLICK START TO BEGIN
        </div>
    </div>

    <script>
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let messageBox = document.getElementById('messageBox');
        let stream = null;
        let frameCount = 0;
        let isDetecting = false;
        let frameSkip = 3;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                isDetecting = true;
                messageBox.className = 'message-box waiting';
                messageBox.textContent = 'SCANNING...';
                processFrames();
            } catch (err) {
                messageBox.className = 'message-box not-detected';
                messageBox.textContent = 'CAMERA ACCESS DENIED';
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            isDetecting = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            messageBox.className = 'message-box waiting';
            messageBox.textContent = 'CLICK START TO BEGIN';
            frameCount = 0;
        }

        function scoreFrame(frame) {
            // Convert to grayscale
            cv.cvtColor(frame, frame, cv.COLOR_RGB2GRAY);
            
            // Edge detection
            let edges = cv.Mat.zeros(frame.rows, frame.cols, cv.CV_8U);
            cv.Canny(frame, edges, 50, 150);
            
            // Find contours
            let contours = new cv.MatVector();
            let hierarchy = cv.Mat.zeros(1, 1, cv.CV_32S);
            cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
            
            let h = frame.rows;
            let w = frame.cols;
            let bestScore = 0;
            let isFullRack = false;
            
            for (let i = 0; i < contours.size(); i++) {
                let cnt = contours.get(i);
                let rect = cv.boundingRect(cnt);
                let cw = rect.width;
                let ch = rect.height;
                
                if (cw === 0) continue;
                
                let aspectRatio = ch / cw;
                
                if (aspectRatio > 2) {
                    let heightCoverage = ch / h;
                    let centerOffset = Math.abs((rect.x + cw / 2) - w / 2) / (w / 2);
                    let centerScore = 1 - centerOffset;
                    
                    let sharpness = 0.5;
                    
                    let score = (0.5 * heightCoverage) + (0.3 * centerScore) + (0.2 * sharpness);
                    
                    if (heightCoverage > 0.7) {
                        isFullRack = true;
                    }
                    
                    if (score > bestScore) {
                        bestScore = score;
                    }
                }
                cnt.delete();
            }
            
            contours.delete();
            hierarchy.delete();
            edges.delete();
            
            return { score: bestScore, isFullRack: isFullRack };
        }

        function processFrames() {
            if (!isDetecting) return;
            
            frameCount++;
            
            if (frameCount % frameSkip === 0) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let src = cv.matFromImageData(imgData);
                
                let result = scoreFrame(src);
                
                if (result.isFullRack) {
                    messageBox.className = 'message-box detected';
                    messageBox.textContent = '✓ FULL FRAME DETECTED';
                } else {
                    messageBox.className = 'message-box not-detected';
                    messageBox.textContent = '✗ FULL FRAME NOT DETECTED';
                }
                
                src.delete();
            }
            
            requestAnimationFrame(processFrames);
        }
    </script>
</body>
</html>

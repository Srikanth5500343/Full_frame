<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rack Recorder</title>

<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  font-family:sans-serif;
  color:#fff;
}

video, canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

#controls{
  position:fixed;
  bottom:20px;
  left:0;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  z-index:5;
}

button{
  padding:12px 18px;
  font-size:16px;
  border:none;
  border-radius:50px;
  font-weight:bold;
}

#startBtn{ background:#00c853; color:#fff; }
#stopBtn{ background:#d50000; color:#fff; }

#timer{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:20px;
  font-weight:bold;
  background:rgba(0,0,0,0.6);
  padding:6px 12px;
  border-radius:8px;
}

#downloadLink{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  background:#00ff88;
  color:#000;
  padding:10px 16px;
  border-radius:6px;
  display:none;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="timer">00:00</div>

<a id="downloadLink" download="rack_video.webm">Download Video</a>

<div id="controls">
  <button id="startBtn" onclick="startRecording()">Start</button>
  <button id="stopBtn" onclick="stopRecording()">Stop</button>
</div>

<script>
const video = document.getElementById('video')
const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')

let mediaRecorder
let recordedChunks = []
let recording = false
let timerInterval
let seconds = 0

// CAMERA
async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:'environment'},
    audio:false
  })
  video.srcObject = stream
}
startCamera()

// TIMER
function updateTimer(){
  seconds++
  const mins = String(Math.floor(seconds/60)).padStart(2,'0')
  const secs = String(seconds%60).padStart(2,'0')
  document.getElementById('timer').textContent = `${mins}:${secs}`
}

// RECORD START
function startRecording(){
  if(recording) return

  recordedChunks = []
  mediaRecorder = new MediaRecorder(video.srcObject)

  mediaRecorder.ondataavailable = e=>{
    if(e.data.size>0) recordedChunks.push(e.data)
  }

  mediaRecorder.onstop = ()=>{
    const blob = new Blob(recordedChunks,{type:'video/webm'})
    const url = URL.createObjectURL(blob)

    const link = document.getElementById('downloadLink')
    link.href = url
    link.style.display = 'block'
  }

  mediaRecorder.start()
  recording = true

  // start timer
  seconds = 0
  document.getElementById('timer').textContent = "00:00"
  timerInterval = setInterval(updateTimer,1000)
}

// RECORD STOP
function stopRecording(){
  if(!recording) return

  mediaRecorder.stop()
  recording = false

  clearInterval(timerInterval)
}

// GUIDE BOX (optional)
function drawGuide(){
  const W=canvas.width=window.innerWidth
  const H=canvas.height=window.innerHeight

  const w=W*0.85
  const h=H*0.85
  const x=(W-w)/2
  const y=(H-h)/2

  ctx.clearRect(0,0,W,H)
  ctx.strokeStyle="yellow"
  ctx.lineWidth=3
  ctx.setLineDash([10,6])
  ctx.strokeRect(x,y,w,h)
}

function loop(){
  drawGuide()
  requestAnimationFrame(loop)
}
loop()

</script>

</body>
</html>
